<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | Sai Anirudh Portfolio</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body
{
  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  font-family:"Segoe UI",sans-serif;

  background:
  linear-gradient(
  135deg,
  #2563eb,
  #7c3aed);

  overflow:hidden;
}

/* ANIMATED BACKGROUND */

body::before
{
  content:"";

  position:absolute;

  width:500px;
  height:500px;

  background:
  rgba(255,255,255,0.08);

  border-radius:50%;

  top:-150px;
  left:-100px;

  animation: float 8s infinite ease-in-out;
}

body::after
{
  content:"";

  position:absolute;

  width:400px;
  height:400px;

  background:
  rgba(255,255,255,0.08);

  border-radius:50%;

  bottom:-120px;
  right:-80px;

  animation: float 10s infinite ease-in-out;
}

@keyframes float
{
  0%
  {
    transform:translateY(0px);
  }

  50%
  {
    transform:translateY(20px);
  }

  100%
  {
    transform:translateY(0px);
  }
}

/* LOGIN CARD */

.login-container
{
  position:relative;

  z-index:1;

  width:600px;

  padding:45px;

  border-radius:25px;

  backdrop-filter: blur(15px);

  background:
  rgba(255,255,255,0.12);

  border:
  1px solid rgba(255,255,255,0.2);

  box-shadow:
  0 8px 32px rgba(0,0,0,0.25);

  text-align:center;

  color:white;
}

/* TITLE */

.login-container h1
{
  margin-bottom:10px;

  font-size:36px;
}

.login-container p
{
  margin-bottom:30px;

  color:#e2e8f0;
}

/* INPUT BOX */

.input-box
{
  margin-bottom:20px;
}

.input-box input
{
  width:100%;

  padding:15px;

  border:none;

  border-radius:12px;

  outline:none;

  background:
  rgba(255,255,255,0.15);

  color:white;

  font-size:16px;
}

.input-box input::placeholder
{
  color:#e2e8f0;
}

/* LOGIN BUTTON */

.login-btn
{
  width:100%;

  padding:15px;

  border:none;

  border-radius:12px;

  background:white;

  color:#2563eb;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.login-btn:hover
{
  transform:translateY(-3px);

  background:#dbeafe;
}

/* ERROR MESSAGE */

#error-message
{
  margin-top:15px;

  color:#fecaca;

  display:none;
}

/* MOBILE */

@media(max-width:500px)
{
  .login-container
  {
    width:90%;
    padding:35px 25px;
  }
}

</style>

</head>

<body>

<div class="login-container">

  <h1>🙏 Welcome to Anirudh's Website 🙏</h1>
  <p>Guess the Login Details from below Hint</p>
  
  <p>Username contains my name</p>
  <p>Password contains my name + number of letters in my name</p>

  <!-- USERNAME -->

  <div class="input-box">

    <input type="text"
           id="username"
           placeholder="Enter Username">

  </div>

  <!-- PASSWORD -->

  <div class="input-box">

    <input type="password"
           id="password"
           placeholder="Enter Password">

  </div>

  <!-- LOGIN BUTTON -->

  <button class="login-btn"
          onclick="login()">

          Login

  </button>

  <!-- ERROR MESSAGE -->

  <p id="error-message">
    Invalid Username or Password
  </p>

</div>

<script>

/* LOGIN FUNCTION */

function login()
{
  const username =
  document.getElementById("username").value;

  const password =
  document.getElementById("password").value;

  /* UPDATED LOGIN DETAILS */

  const correctUsername = "Anirudh";

  const correctPassword = "Anirudh7";

  if(
    username === correctUsername &&
    password === correctPassword
  )
  {
    window.location.href = "index.html";
  }
  else
  {
    document
    .getElementById("error-message")
    .style.display = "block";
  }
}

</script>

</body>

</html>
